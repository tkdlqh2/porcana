<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=375, initial-scale=1.0">
  <title>14. Create Inquiry - Porcana</title>
  <link rel="stylesheet" href="common.css">
</head>
<body>
  <a href="index.html" class="nav-link">Back to index</a>

  <div class="screen">
    <div class="screen-content">
      <div class="status-bar">
        <span>5:33</span>
        <span>70%</span>
      </div>

      <div class="header">
        <a href="09-mypage.html" class="back-btn" style="text-decoration:none; color:#fff;">&larr;</a>
        <div class="header-title" style="font-size:24px;">New Inquiry</div>
        <div style="width:28px;"></div>
      </div>

      <div style="padding:0 20px 24px;">
        <div class="summary-card" style="margin:0 0 16px 0;">
          <div class="summary-row">
            <span class="summary-label">Reply to</span>
            <span class="summary-value">hello@porcana.io</span>
          </div>
          <div class="summary-row">
            <span class="summary-label">Expected response</span>
            <span class="summary-value">within 24 hours</span>
          </div>
        </div>

        <div style="margin-bottom:16px;">
          <div style="font-size:13px; color:#888; margin-bottom:8px;">Category</div>
          <div class="filter-tabs" style="padding:0; flex-wrap:wrap;">
            <div class="filter-tab active">GENERAL</div>
            <div class="filter-tab">ACCOUNT</div>
            <div class="filter-tab">BUG_REPORT</div>
            <div class="filter-tab">FEATURE_REQUEST</div>
            <div class="filter-tab">PARTNERSHIP</div>
          </div>
        </div>

        <div style="margin-bottom:16px;">
          <div style="font-size:13px; color:#888; margin-bottom:8px;">Title</div>
          <input class="modal-input" style="margin-bottom:0;" value="Need help with account verification" />
        </div>

        <div style="margin-bottom:20px;">
          <div style="font-size:13px; color:#888; margin-bottom:8px;">Message</div>
          <textarea class="modal-input" style="min-height:220px; resize:none; line-height:1.6;">I signed up with the wrong email address and cannot complete verification. Please let me know what information you need to recover the account.</textarea>
        </div>

        <div class="summary-card" style="margin:0;">
          <div class="summary-row">
            <span class="summary-label">Files</span>
            <span class="summary-value">Optional later</span>
          </div>
          <div class="summary-row">
            <span class="summary-label">Visibility</span>
            <span class="summary-value">Only you and admins</span>
          </div>
        </div>
      </div>
    </div>

    <div class="action-buttons">
      <a href="09-mypage.html" class="btn btn-secondary" style="text-decoration:none; display:flex; align-items:center; justify-content:center;">Cancel</a>
      <a href="15-inquiry-detail.html" class="btn btn-primary" style="text-decoration:none; display:flex; align-items:center; justify-content:center;">Submit</a>
    </div>
  </div>
</body>
</html>

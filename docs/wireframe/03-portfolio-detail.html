          </div>
        </div>

        <div class="stat-label" style="margin-top:16px;">📊 위험 분포</div>
        <div class="risk-chart">
          <div class="risk-bar-container">
            <div class="risk-value">29.7</div>
            <div class="risk-bar" style="height:60px;">
              <div class="risk-fill" style="height:60%;"></div>
            </div>
            <div class="risk-label">1</div>
          </div>
          <div class="risk-bar-container">

              <div class="risk-fill" style="height:0%;"></div>

            <div class="risk-label">3</div>
          </div>
          <div class="risk-bar-container">
            <div class="risk-value">20.5</div>
            <div class="risk-bar" style="height:60px;">
              <div class="risk-fill" style="height:40%;"></div>
            </div>
            <div class="risk-label">4</div>
          </div>
          <div class="risk-bar-container">
            <div class="risk-value">9.8</div>
            <div class="risk-bar" style="height:60px;">
              <div class="risk-fill" style="height:20%;"></div>
            </div>
            <div class="risk-label">5</div>
          </div>
        </div>
      </div>

      <div style="display:flex; justify-content:space-between; align-items:center; padding:0 20px;">
        <div class="section-title" style="padding:0;">주요 자산</div>
        <a href="04-weight-edit.html" class="btn btn-outline" style="width:auto; padding:8px 16px; font-size:13px; text-decoration:none;">자산 비중 수정</a>
      </div>

      <div class="asset-item">
        <div class="asset-logo">📊</div>
        <div class="asset-info">
          <div class="asset-name">쏠리드</div>
          <div class="asset-code">050890</div>
        </div>
        <div class="asset-weight">11.06%</div>
        <div class="asset-return positive">80.63%</div>
      </div>

      <div class="asset-item">
        <div class="asset-logo">📊</div>
        <div class="asset-info">
          <div class="asset-name">삼성전자</div>
          <div class="asset-code">005930</div>

      <div class="asset-item">

    <div class="bottom-nav">
